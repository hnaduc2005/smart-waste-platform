server:
  port: 8087 # Admin service port

spring:
  application:
    name: admin-service

eureka:
  instance:
    prefer-ip-address: true
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# OpenFeign Configuration to suppress unneeded warnings
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
