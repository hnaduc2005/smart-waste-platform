spring:
  application:
    name: auth-service
  config:
    # optional: bỏ qua nếu Config Server chưa khởi động (local dev)
    import: optional:configserver:http://config-server:8888

  # ── Fallback config khi chạy LOCAL (không dùng Docker) ──────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-db}:${DB_PORT:5432}/auth_db
    username: ecocycle
    password: ecocycle_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:redis-cache}
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8081

# ── JWT Configuration (override bởi Config Server khi chạy Docker) ────────
jwt:
  secret: ecocycle_jwt_secret_key_must_be_at_least_256_bits_long_for_hs256
  expiration-ms: 86400000        # 24 giờ
  refresh-expiration-ms: 604800000  # 7 ngày

eureka:
  instance:
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
