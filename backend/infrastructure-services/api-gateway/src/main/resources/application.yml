server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # === AUTH SERVICE ===
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        # === USER SERVICE ===
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

        # === COLLECTION SERVICE ===
        - id: collection-service-route
          uri: lb://collection-service
          predicates:
            - Path=/api/v1/requests/**

        - id: collection-tasks-route
          uri: lb://collection-service
          predicates:
            - Path=/api/v1/tasks/**

        # === REWARD SERVICE ===
        - id: reward-service-route
          uri: lb://reward-service
          predicates:
            - Path=/api/v1/rewards/**

        # === NOTIFICATION SERVICE ===
        - id: notification-service-route
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

        - id: feedback-route
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/feedbacks/**

      # GlobalFilter: Thêm CORS header cho Gateway
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

eureka:
  instance:
    prefer-ip-address: true
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
