server:
  port: 8080

spring:
  application:
    name: api-gateway
  codec:
    max-in-memory-size: 20MB
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # === AUTH SERVICE ===
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        # === USER SERVICE ===
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - AuthenticationFilter

        # === COMPLAINTS (user-service) ===
        - id: complaint-route
          uri: lb://user-service
          predicates:
            - Path=/api/v1/complaints/**
          filters:
            - AuthenticationFilter

        # === COLLECTION SERVICE ===
        - id: collection-service-route
          uri: lb://collection-service
          predicates:
            - Path=/api/v1/collections/**
          filters:
            - name: AuthenticationFilter
              args:
                allowedRoles:
                  - CITIZEN
                  - COLLECTOR
                  - ENTERPRISE

        # === REWARD SERVICE ===
        - id: reward-service-route
          uri: lb://reward-service
          predicates:
            - Path=/api/v1/rewards/**
          filters:
            - AuthenticationFilter

        # === NOTIFICATION SERVICE ===
        - id: notification-service-route
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - AuthenticationFilter

        - id: feedback-route
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/feedback/**
          filters:
            - AuthenticationFilter

        - id: device-token-route
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/device-tokens/**
          filters:
            - AuthenticationFilter

        # === ENTERPRISE SERVICE (Khối 5) ===
        - id: enterprise-service-route
          uri: lb://enterprise-service
          predicates:
            - Path=/api/v1/enterprises/**
          filters:
            - name: AuthenticationFilter
              args:
                allowedRoles:
                  - ENTERPRISE
                  - COLLECTOR

        - id: vehicle-service-route
          uri: lb://enterprise-service
          predicates:
            - Path=/api/v1/vehicles/**
          filters:
            - name: AuthenticationFilter
              args:
                allowedRoles:
                  - ENTERPRISE

        # === ANALYTICS SERVICE (Khối 5) ===
        - id: analytics-service-route
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - AuthenticationFilter

        # === ADMIN SERVICE ===
        - id: admin-service-route
          uri: lb://admin-service
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - name: AuthenticationFilter
              args:
                allowedRoles:
                  - ADMIN

      # GlobalFilter: Thêm CORS header cho Gateway
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

eureka:
  instance:
    prefer-ip-address: true
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway


jwt:
  secret: ecocycle_jwt_secret_key_must_be_at_least_256_bits_long_for_hs256
