server:
  port: 8761

spring:
  application:
    name: discovery-server

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:discovery-server}
  client:
    registerWithEureka: false 
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${EUREKA_INSTANCE_HOSTNAME:discovery-server}:${server.port}/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, info
